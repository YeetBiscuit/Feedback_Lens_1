<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback Detail</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f4;min-height:100vh;color:#1f2937}

.navbar{background:#2563eb;padding:.75rem 2rem;display:flex;justify-content:space-between;align-items:center;position:relative}
.nav-logo{color:#fff;font-size:1.125rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.nav-logo-icon{background:#fff;color:#2563eb;width:2rem;height:2rem;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.875rem}
.nav-center{display:flex;gap:.5rem}
.nav-link{background:transparent;color:#fff;border:none;padding:.4rem 1rem;border-radius:20px;font-size:.875rem;cursor:pointer;font-family:inherit;font-weight:500}
.nav-link:hover{background:rgba(255,255,255,.18)}
.nav-link.active{background:rgba(255,255,255,.25)}
.nav-right{display:flex;align-items:center;gap:.75rem;position:relative}
.font-toggle{display:flex;background:rgba(255,255,255,.18);border-radius:20px;padding:3px;gap:2px}
.font-btn{background:transparent;color:#fff;border:none;padding:4px 10px;border-radius:16px;font-size:.8rem;cursor:pointer;font-family:inherit}
.font-btn.active{background:#fff;color:#2563eb;font-weight:600}
.nav-user{color:#fff;text-align:right;line-height:1.2}
.nav-user-name{font-size:.875rem;font-weight:600}
.nav-user-role{font-size:.75rem;opacity:.8}
.nav-avatar{width:2.25rem;height:2.25rem;border-radius:50%;background:#fff;color:#2563eb;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.875rem;cursor:pointer}

.dropdown{position:absolute;top:calc(100% + .5rem);background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50;display:none}
.dropdown.show{display:block}
.user-menu{right:0;min-width:11rem;padding:.5rem}
.user-menu-email{padding:.5rem .75rem;font-size:.8125rem;color:#6b7280;border-bottom:1px solid #f3f4f6;margin-bottom:.25rem}
.user-menu-item{padding:.55rem .75rem;border-radius:6px;cursor:pointer;font-size:.875rem;color:#1f2937}
.user-menu-item:hover{background:#f9fafb}
.user-menu-item.danger{color:#dc2626}

.wrap{padding:1.5rem 2rem;max-width:1100px;margin:0 auto}
.breadcrumb{font-size:.8125rem;color:#6b7280;margin-bottom:1rem}
.breadcrumb span{color:#1f2937;font-weight:500}
.breadcrumb a{color:#6b7280;text-decoration:none}
.breadcrumb a:hover{color:#2563eb}

.info-bar{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:.85rem 1.25rem;margin-bottom:1rem;display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.info-item label{display:block;font-size:.75rem;color:#6b7280;margin-bottom:4px}
.info-item .value{font-size:.9375rem;font-weight:600;color:#1f2937}
.grade-pill{display:inline-block;padding:.25rem .75rem;border-radius:12px;font-size:.875rem;font-weight:700;background:#eff6ff;color:#1e40af}

.panel{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.panel-title{font-size:1rem;font-weight:600;margin-bottom:1rem}

.accordion-item{border:1px solid #e5e7eb;border-radius:8px;margin-bottom:.5rem;overflow:hidden}
.accordion-header{padding:.85rem 1rem;background:#f9fafb;cursor:pointer;display:flex;align-items:center;gap:.5rem;font-size:.9375rem;font-weight:500}
.accordion-header:hover{background:#f3f4f6}
.accordion-arrow{font-size:.75rem;color:#6b7280;transition:transform .15s}
.accordion-item.open .accordion-arrow{transform:rotate(90deg)}
.accordion-body{display:none;padding:1rem;background:#fff}
.accordion-item.open .accordion-body{display:block}

.field-block{margin-bottom:.85rem}
.field-label{font-size:.8125rem;font-weight:600;color:#4b5563;margin-bottom:.35rem}
.field-content{font-size:.875rem;color:#374151;background:#fafafa;border:1px solid #e5e7eb;border-radius:6px;padding:.65rem .8rem;line-height:1.6;white-space:pre-wrap}
.field-content.empty{color:#9ca3af;font-style:italic}

.mark-row{display:flex;gap:2rem;font-size:.875rem;margin-top:.5rem}

.overall-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;align-items:start}
.preview-box{background:#fafafa;border:1px solid #e5e7eb;border-radius:8px;padding:1rem;max-height:28rem;overflow-y:auto;white-space:pre-wrap;font-size:.8125rem;line-height:1.7;color:#374151}
.analysis-block{display:flex;flex-direction:column;gap:1rem}
.feedback-box{background:#fafafa;border:1px solid #e5e7eb;border-radius:8px;padding:.75rem;font-size:.8125rem;line-height:1.6;color:#374151;max-height:14rem;overflow-y:auto;white-space:pre-wrap}
.feedback-box.empty{color:#9ca3af;font-style:italic}
.totals-row{display:flex;flex-direction:column;gap:.35rem;font-size:.875rem}
.totals-row .row{display:flex;justify-content:space-between;padding:.35rem 0;border-bottom:1px solid #f3f4f6}
.totals-row .row:last-child{border-bottom:none}

.rating-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.85rem}
.star{cursor:pointer;font-size:1.5rem;color:#e5e7eb;transition:color .1s}
.star:hover, .star.active{color:#fbbf24}
.rating-textarea{width:100%;min-height:5rem;padding:.6rem .8rem;border:1px solid #d1d5db;border-radius:8px;font-size:.875rem;font-family:inherit;resize:vertical}
.rating-textarea:focus{outline:none;border-color:#2563eb}
.rating-actions{display:flex;justify-content:flex-end;margin-top:.75rem}
.btn-submit-rating{padding:.5rem 1.25rem;background:#1f2937;color:#fff;border:none;border-radius:8px;font-size:.875rem;cursor:pointer;font-family:inherit}
.btn-submit-rating:hover{background:#111827}
.rating-hint{font-size:.75rem;color:#6b7280}

.bottom-bar{display:flex;justify-content:flex-end}
.btn-back{padding:.5rem 1.25rem;background:#fff;border:1px solid #d1d5db;border-radius:8px;font-size:.875rem;cursor:pointer;font-family:inherit;color:#374151}
.btn-back:hover{background:#f9fafb}
.loading{color:#888;text-align:center;padding:2rem}
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-logo">
    <div class="nav-logo-icon">FL</div>
    FeedbackLens
  </div>
  <div class="nav-center">
    <button class="nav-link" onclick="location.href='/student'">Home</button>
    <button class="nav-link" onclick="location.href='/student/units'">My Units</button>
    <button class="nav-link" onclick="location.href='/student/assessments'">Assessments</button>
    <button class="nav-link active" onclick="location.href='/student/feedback'">Feedback</button>
  </div>
  <div class="nav-right">
    <div class="font-toggle">
      <button class="font-btn" data-size="14">A-</button>
      <button class="font-btn active" data-size="16">A</button>
      <button class="font-btn" data-size="18">A+</button>
    </div>
    <div class="nav-user">
      <div class="nav-user-name" id="nav-name">-</div>
      <div class="nav-user-role">Student</div>
    </div>
    <div class="nav-avatar" id="nav-avatar" onclick="toggleUserMenu(event)">-</div>
    <div class="dropdown user-menu" id="user-menu">
      <div class="user-menu-email" id="user-menu-email">-</div>
      <div class="user-menu-item danger" onclick="location.href='/logout'">Log out</div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="breadcrumb" id="breadcrumb">Home &rsaquo; <a href="/student/feedback">Feedback</a> &rsaquo; <span>Detail</span></div>

  <div id="content">
    <div class="loading">Loading...</div>
  </div>

  <div class="bottom-bar">
    <button class="btn-back" onclick="history.back()">Back</button>
  </div>
</div>

<script>
var genId = {{ generation_id }};
var data = null;
var currentRating = 0;

function initials(name){
  if(!name) return '?';
  var p = name.trim().split(/\s+/);
  return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
}

function escapeHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(ch){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
  });
}

var saved = localStorage.getItem('fl-font-size');
if(saved){
  document.documentElement.style.fontSize = saved + 'px';
  document.querySelectorAll('.font-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.size === saved);
  });
}
document.querySelectorAll('.font-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    var s = btn.dataset.size;
    document.documentElement.style.fontSize = s + 'px';
    localStorage.setItem('fl-font-size', s);
    document.querySelectorAll('.font-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  });
});

function toggleUserMenu(e){
  e.stopPropagation();
  document.getElementById('user-menu').classList.toggle('show');
}
document.addEventListener('click', function(){
  document.getElementById('user-menu').classList.remove('show');
});
document.getElementById('user-menu').addEventListener('click', function(e){ e.stopPropagation(); });

fetch('/api/student/home').then(function(r){return r.json();}).then(function(d){
  if(!d.user) return;
  var name = d.user.display_name || d.user.email;
  document.getElementById('nav-name').textContent = name;
  document.getElementById('nav-avatar').textContent = initials(name);
  document.getElementById('user-menu-email').textContent = d.user.email || '';
});

fetch('/api/student/feedback/' + genId).then(function(r){return r.json();}).then(function(d){
  if(d.error){
    document.getElementById('content').innerHTML = '<div class="loading" style="color:#c00">' + d.error + '</div>';
    return;
  }
  data = d;
  render();
});

function gradeFromMark(mark){
  if(mark == null || isNaN(mark)) return null;
  var n = Number(mark);
  if(n < 50) return 'N';
  if(n < 60) return 'P';
  if(n < 70) return 'C';
  if(n < 80) return 'D';
  return 'HD';
}

function renderFinalMark(mark){
  if(mark == null) return '-';
  var grade = gradeFromMark(mark);
  if(!grade) return String(mark);
  return mark + ' <span class="grade-pill" style="margin-left:.4rem">' + grade + '</span>';
}


function render(){
  var run = data.run || {};
  var overall = data.overall_feedback || {};
  var crits = data.criterion_feedback || [];

  document.getElementById('breadcrumb').innerHTML =
    'Home &rsaquo; <a href="/student/feedback">Feedback</a> &rsaquo; <span>' + escapeHtml(run.unit_code || 'Detail') + '</span>';

  var html = ''
    + '<div class="info-bar">'
    +   '<div class="info-item"><label>Assessment</label><div class="value">' + escapeHtml(run.assignment_name || '-') + '<div style="font-size:.75rem;font-weight:400;color:#6b7280;margin-top:2px">' + escapeHtml(run.unit_code || '') + '</div></div></div>'
    +   '<div class="info-item"><label>Marked By</label><div class="value">' + escapeHtml(run.educator_name || '-') + '</div></div>'
    +   '<div class="info-item"><label>Final Mark</label><div class="value">' + renderFinalMark(overall.final_mark) + '</div></div>'
    + '</div>'

    + '<div class="panel">'
    +   '<div class="panel-title">Criterion Breakdown</div>'
    +   '<div>' + renderAccordion(crits) + '</div>'
    + '</div>'

    + '<div class="panel">'
    +   '<div class="panel-title">Overall Feedback</div>'
    +   '<div class="overall-grid">'
    +     '<div>'
    +       '<div class="field-label">Your Submission</div>'
    +       '<div class="preview-box">' + escapeHtml(run.submission_text || '(no submission text available)') + '</div>'
    +     '</div>'
    +     '<div class="analysis-block">'
    +       '<div>'
    +         '<div class="field-label">Overall Comment</div>'
    +         '<div class="feedback-box">' + escapeHtml(overall.overall_comment || '(none)') + '</div>'
    +       '</div>'
    +       renderKeyPoints('Key Strengths', overall.key_strengths)
    +       renderKeyPoints('Priority Improvements', overall.priority_improvements)
    +       '<div class="totals-row">'
    +         '<div class="row"><span>Final Mark:</span><strong>' + (overall.final_mark != null ? overall.final_mark : '-') + '</strong></div>'
    +       '</div>'
    +     '</div>'
    +   '</div>'
    + '</div>'

    + '<div class="panel">'
    +   '<div class="panel-title">Rate this feedback</div>'
    +   '<div class="rating-hint" style="margin-bottom:.75rem">Your feedback helps us improve the AI feedback system.</div>'
    +   '<div class="rating-row" id="rating-stars">'
    +     '<span class="star" data-value="1">&#9733;</span>'
    +     '<span class="star" data-value="2">&#9733;</span>'
    +     '<span class="star" data-value="3">&#9733;</span>'
    +     '<span class="star" data-value="4">&#9733;</span>'
    +     '<span class="star" data-value="5">&#9733;</span>'
    +     '<span class="rating-hint" id="rating-label" style="margin-left:.5rem">Not rated yet</span>'
    +   '</div>'
    +   '<textarea class="rating-textarea" id="rating-comment" placeholder="Optionally share your thoughts on this feedback..."></textarea>'
    +   '<div class="rating-actions">'
    +     '<button class="btn-submit-rating" onclick="submitRating()">Submit Rating</button>'
    +   '</div>'
    + '</div>';

  document.getElementById('content').innerHTML = html;

  document.querySelectorAll('#rating-stars .star').forEach(function(s){
    s.addEventListener('click', function(){
      currentRating = parseInt(s.dataset.value, 10);
      highlightStars();
    });
    s.addEventListener('mouseenter', function(){
      var v = parseInt(s.dataset.value, 10);
      previewStars(v);
    });
  });
  document.getElementById('rating-stars').addEventListener('mouseleave', function(){
    highlightStars();
  });
}

function highlightStars(){
  document.querySelectorAll('#rating-stars .star').forEach(function(s){
    var v = parseInt(s.dataset.value, 10);
    s.classList.toggle('active', v <= currentRating);
  });
  var labels = ['Not rated yet', 'Poor', 'Fair', 'Good', 'Very good', 'Excellent'];
  document.getElementById('rating-label').textContent = labels[currentRating] || labels[0];
}

function previewStars(v){
  document.querySelectorAll('#rating-stars .star').forEach(function(s){
    var sv = parseInt(s.dataset.value, 10);
    s.classList.toggle('active', sv <= v);
  });
}

function renderAccordion(crits){
  if(!crits.length){
    return '<div style="text-align:center;color:#888;padding:1.5rem">No criterion-level feedback.</div>';
  }
  return crits.map(function(c, i){
    var aiText = ((c.strengths || '') + '\n\n' + (c.areas_for_improvement || '') + '\n\n' + (c.improvement_suggestion || '')).trim();
    return '<div class="accordion-item" id="acc-' + i + '">'
      + '<div class="accordion-header" onclick="toggleAcc(' + i + ')">'
      +   '<span class="accordion-arrow">&#9654;</span>'
      +   '<span>' + escapeHtml(c.criterion_name || ('Criterion ' + (i + 1))) + '</span>'
      + '</div>'
      + '<div class="accordion-body">'
      +   '<div class="field-block">'
      +     '<div class="field-label">Feedback</div>'
      +     '<div class="field-content">' + escapeHtml(aiText || '(none)') + '</div>'
      +   '</div>'
      +   '<div class="mark-row">'
      +     '<div>Mark: <strong>' + (c.mark != null ? c.mark : '-') + '</strong></div>'
      +   '</div>'
      + '</div>'
      + '</div>';
  }).join('');
}

function renderKeyPoints(label, items){
  if(!items || !items.length) return '';
  var lis = items.map(function(it){ return '<li>' + escapeHtml(it) + '</li>'; }).join('');
  return '<div>'
    + '<div class="field-label">' + label + '</div>'
    + '<div class="feedback-box"><ul style="padding-left:1.25rem;margin:0">' + lis + '</ul></div>'
    + '</div>';
}

function toggleAcc(i){
  document.getElementById('acc-' + i).classList.toggle('open');
}

function submitRating(){
  if(currentRating === 0){
    alert('Please select a rating before submitting.');
    return;
  }
  var comment = document.getElementById('rating-comment').value.trim();
  alert('Rating (' + currentRating + ' stars)' + (comment ? ' and comment' : '') + ' submission will be handled by the backend.');
}
</script>
</body>
</html>
