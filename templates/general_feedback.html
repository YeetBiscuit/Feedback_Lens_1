<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Overall Feedback</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f4;min-height:100vh;color:#1f2937}
.navbar{background:#2563eb;padding:.75rem 2rem;display:flex;justify-content:space-between;align-items:center}
.nav-logo{color:#fff;font-size:1.125rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.nav-logo-icon{background:#fff;color:#2563eb;width:2rem;height:2rem;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.875rem}
.nav-center{display:flex;gap:.5rem}
.nav-btn{background:rgba(255,255,255,.18);color:#fff;border:none;padding:.4rem 1rem;border-radius:20px;font-size:.875rem;cursor:pointer}
.nav-btn:hover{background:rgba(255,255,255,.28)}
.nav-right{display:flex;align-items:center;gap:.75rem}
.font-toggle{display:flex;background:rgba(255,255,255,.18);border-radius:20px;padding:3px;gap:2px}
.font-btn{background:transparent;color:#fff;border:none;padding:4px 10px;border-radius:16px;font-size:.8rem;cursor:pointer}
.font-btn.active{background:#fff;color:#2563eb;font-weight:600}
.nav-user{color:#fff;text-align:right;line-height:1.2}
.nav-user-name{font-size:.875rem;font-weight:600}
.nav-user-role{font-size:.75rem;opacity:.8}
.nav-avatar{width:2.25rem;height:2.25rem;border-radius:50%;background:#fff;color:#2563eb;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.875rem}
.nav-avatar{cursor:pointer}
.navbar{position:relative}
.nav-center{position:relative}
.nav-right{position:relative}
.dropdown{position:absolute;top:calc(100% + .5rem);background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50;display:none}
.dropdown.show{display:block}
.unit-picker{left:0;width:22rem;padding:.75rem}
.unit-picker input{width:100%;padding:.5rem .75rem;border:1px solid #d1d5db;border-radius:8px;font-size:.875rem;margin-bottom:.5rem;font-family:inherit}
.unit-picker input:focus{outline:none;border-color:#2563eb}
.unit-option{padding:.6rem .75rem;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.unit-option:hover{background:#f9fafb}
.unit-option-meta{flex:1}
.unit-option-code{font-weight:700;font-size:.9375rem;color:#1f2937}
.unit-option-name{font-size:.8125rem;color:#6b7280;margin-top:2px}
.unit-option-status{font-size:.7rem;padding:2px 8px;border-radius:10px;background:#dcfce7;color:#15803d;font-weight:500}
.user-menu{right:0;min-width:11rem;padding:.5rem}
.user-menu-email{padding:.5rem .75rem;font-size:.8125rem;color:#6b7280;border-bottom:1px solid #f3f4f6;margin-bottom:.25rem}
.user-menu-item{padding:.55rem .75rem;border-radius:6px;cursor:pointer;font-size:.875rem;color:#1f2937}
.user-menu-item:hover{background:#f9fafb}
.user-menu-item.danger{color:#dc2626}
.empty{color:#999;font-size:.875rem;text-align:center;padding:1rem}

.wrap{padding:1.25rem}
.top-bar{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1rem 1.5rem;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.meta{display:flex;gap:2.5rem;align-items:center;flex-wrap:wrap}
.meta-item label{font-size:.75rem;color:#6b7280;display:block;margin-bottom:2px}
.meta-item span{font-size:1rem;font-weight:600}
.status-display{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .8rem;border:1px solid #e5e7eb;border-radius:18px;font-size:.8125rem;font-weight:500;background:#fff}
.status-dot{width:.5rem;height:.5rem;border-radius:50%;background:#fcd34d}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;align-items:start}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:1rem;font-weight:600;margin-bottom:1rem}

.submission-box{border:1px solid #e5e7eb;border-radius:8px;padding:1rem;background:#fafafa;max-height:35rem;overflow-y:auto;white-space:pre-wrap;font-size:.8125rem;line-height:1.7;color:#374151;font-family:inherit}
.word-count{font-size:.8125rem;color:#6b7280;margin-top:.75rem}
.word-count strong{color:#1f2937}

.gen-form .form-group{margin-bottom:.75rem}
.form-label{font-size:.8125rem;color:#6b7280;display:block;margin-bottom:4px}
.settings-control{display:flex;flex-direction:column;gap:4px;margin-bottom:.75rem}
.settings-control span{font-size:.75rem;color:#6b7280}
.settings-control select{width:100%;padding:.5rem .7rem;border:1px solid #d1d5db;border-radius:8px;font-size:.875rem;background:#fff;font-family:inherit}
.settings-control select:focus{outline:none;border-color:#2563eb}
.btn-reset{width:100%;padding:.5rem .8rem;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#374151;font-size:.8125rem;cursor:pointer;font-family:inherit;margin-bottom:.75rem}
.btn-reset:hover{background:#f9fafb}
.btn-generate{width:100%;padding:.65rem;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.9375rem;font-weight:500;cursor:pointer;font-family:inherit}
.btn-generate:hover{background:#1d4ed8}

textarea{width:100%;padding:.55rem .7rem;border:1px solid #d1d5db;border-radius:8px;font-size:.875rem;line-height:1.6;resize:vertical;font-family:inherit}
textarea:focus{outline:none;border-color:#2563eb}
input[type=number]{width:100%;padding:.55rem .7rem;border:1px solid #d1d5db;border-radius:8px;font-size:.875rem;font-family:inherit}

.grade-row{margin-top:.75rem}
.grade-toggle{font-size:.8125rem;color:#2563eb;cursor:pointer;background:none;border:none;padding:0;font-family:inherit;text-decoration:underline}
.grade-area{margin-top:.5rem;display:none;align-items:center;gap:.5rem}
.grade-area.show{display:flex}
.grade-label{font-size:.8125rem;color:#6b7280}
.grade-badge{font-size:1.375rem;font-weight:700;color:#7c3aed}

.list-block{margin-top:1rem}
.list-block h4{font-size:.8125rem;font-weight:600;margin-bottom:.4rem}
.list-block ul{padding-left:1.2rem;font-size:.8125rem;line-height:1.7;color:#4b5563}

.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1rem;gap:.5rem;flex-wrap:wrap}
.btn{padding:.55rem 1.4rem;border-radius:8px;font-size:.875rem;cursor:pointer;border:none;font-family:inherit;font-weight:500}
.btn-secondary{background:#fff;border:1px solid #d1d5db;color:#374151}
.btn-secondary:hover{background:#f9fafb}
.btn-draft{background:#fff;border:1px solid #d1d5db;color:#374151}
.btn-draft:hover{background:#f9fafb}
.btn-save{background:#16a34a;color:#fff}
.btn-save:hover{background:#15803d}

.loading{text-align:center;padding:3rem;color:#888}
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-logo">
    <div class="nav-logo-icon">FL</div>
    FeedbackLens
  </div>
  <div class="nav-center">
    <button class="nav-btn" onclick="location.href='/educator'">Home</button>
    <button class="nav-btn" id="unit-btn" onclick="toggleUnitPicker(event)">-</button>
    <div class="dropdown unit-picker" id="unit-picker">
      <input type="text" id="unit-search" placeholder="Search units..." oninput="filterUnits()">
      <div id="unit-list"></div>
    </div>
  </div>
  <div class="nav-right">
    <div class="font-toggle">
      <button class="font-btn" data-size="14">A-</button>
      <button class="font-btn active" data-size="16">A</button>
      <button class="font-btn" data-size="18">A+</button>
    </div>
    <div class="nav-user">
      <div class="nav-user-name" id="nav-name">-</div>
      <div class="nav-user-role">Educator</div>
    </div>
    <div class="nav-avatar" id="nav-avatar" onclick="toggleUserMenu(event)">-</div>
    <div class="dropdown user-menu" id="user-menu">
      <div class="user-menu-email" id="user-menu-email">-</div>
      <div class="user-menu-item danger" onclick="location.href='/logout'">Log out</div>
    </div>
  </div>
</div>

<div class="wrap">

<div class="top-bar">
  <div class="meta">
    <div class="meta-item"><label>Student</label><span id="student-id">-</span></div>
    <div class="meta-item"><label>Assignment</label><span id="assignment-name">-</span></div>
    <div class="meta-item">
      <label>Status</label>
      <div class="status-display">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Pending</span>
      </div>
    </div>
  </div>
</div>

<div id="content">
  <div class="loading">Loading...</div>
</div>

</div>

<script>
var data = null;
var genId = null;
var gradeVisible = false;
var settingsStorageKey = 'fl-feedback-generation-settings';
var defaultGenerationSettings = {
  feedback_length: 'standard',
  feedback_tone: 'clear_supportive'
};

var statusLabels = {pending:'Pending Review', ai_generated:'AI Generated', reviewed:'Reviewed'};
var statusColors = {pending:'#fcd34d', ai_generated:'#93c5fd', reviewed:'#86efac'};

function qs(name){
  return new URLSearchParams(location.search).get(name);
}

function initials(name){
  if(!name) return '?';
  var p = name.trim().split(/\s+/);
  return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(ch){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
  });
}

function getGenerationSettings(){
  return {
    feedback_length: document.getElementById('feedback-length').value,
    feedback_tone: document.getElementById('feedback-tone').value
  };
}

function saveGenerationSettings(){
  var settings = getGenerationSettings();
  localStorage.setItem(settingsStorageKey, JSON.stringify(settings));
}

function resetGenerationSettings(){
  document.getElementById('feedback-length').value = defaultGenerationSettings.feedback_length;
  document.getElementById('feedback-tone').value = defaultGenerationSettings.feedback_tone;
  saveGenerationSettings();
}

function initGenerationSettings(){
  var savedSettings = null;
  try {
    savedSettings = JSON.parse(localStorage.getItem(settingsStorageKey) || 'null');
  } catch(e) {
    savedSettings = null;
  }
  document.getElementById('feedback-length').value =
    (savedSettings && savedSettings.feedback_length) || defaultGenerationSettings.feedback_length;
  document.getElementById('feedback-tone').value =
    (savedSettings && savedSettings.feedback_tone) || defaultGenerationSettings.feedback_tone;
  document.getElementById('feedback-length').addEventListener('change', saveGenerationSettings);
  document.getElementById('feedback-tone').addEventListener('change', saveGenerationSettings);
}

function buildGenerationSettingsPanel(buttonText, actionName){
  return '<div class="card gen-form">'
    + '<div class="card-title">Feedback Settings</div>'
    + '<label class="settings-control">'
    + '<span>Length</span>'
    + '<select id="feedback-length">'
    + '<option value="concise">Concise</option>'
    + '<option value="standard">Standard</option>'
    + '<option value="detailed">Detailed</option>'
    + '</select>'
    + '</label>'
    + '<label class="settings-control">'
    + '<span>Tone</span>'
    + '<select id="feedback-tone">'
    + '<option value="clear_supportive">Clear + supportive</option>'
    + '<option value="gentle_encouraging">Gentle + encouraging</option>'
    + '<option value="direct_no_fluff">Direct, no fluff</option>'
    + '</select>'
    + '</label>'
    + '<button class="btn-reset" onclick="resetGenerationSettings()">Reset</button>'
    + '<button class="btn-generate" onclick="' + actionName + '()">' + buttonText + '</button>'
    + '</div>';
}

var saved = localStorage.getItem('fl-font-size');
if(saved){
  document.documentElement.style.fontSize = saved + 'px';
  document.querySelectorAll('.font-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.size === saved);
  });
}
document.querySelectorAll('.font-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    var s = btn.dataset.size;
    document.documentElement.style.fontSize = s + 'px';
    localStorage.setItem('fl-font-size', s);
    document.querySelectorAll('.font-btn').forEach(function(b){
      b.classList.remove('active');
    });
    btn.classList.add('active');
  });
});

var allUnits = [];

function toggleUnitPicker(e){
  e.stopPropagation();
  document.getElementById('user-menu').classList.remove('show');
  document.getElementById('unit-picker').classList.toggle('show');
}
function toggleUserMenu(e){
  e.stopPropagation();
  document.getElementById('unit-picker').classList.remove('show');
  document.getElementById('user-menu').classList.toggle('show');
}
document.addEventListener('click', function(){
  document.getElementById('unit-picker').classList.remove('show');
  document.getElementById('user-menu').classList.remove('show');
});
document.getElementById('unit-picker').addEventListener('click', function(e){ e.stopPropagation(); });
document.getElementById('user-menu').addEventListener('click', function(e){ e.stopPropagation(); });

function filterUnits(){
  var q = document.getElementById('unit-search').value.trim().toLowerCase();
  var filtered = allUnits.filter(function(u){
    return !q || u.unit_code.toLowerCase().indexOf(q) !== -1 || u.unit_name.toLowerCase().indexOf(q) !== -1;
  });
  document.getElementById('unit-list').innerHTML = filtered.map(function(u){
    return '<div class="unit-option" onclick="location.href=\'/educator/unit/' + u.unit_id + '\'">'
      + '<div class="unit-option-meta">'
      +   '<div class="unit-option-code">' + u.unit_code + '</div>'
      +   '<div class="unit-option-name">' + u.unit_name + '</div>'
      + '</div>'
      + '<div class="unit-option-status">In Progress</div>'
      + '</div>';
  }).join('') || '<div class="empty">No matching units</div>';
}

fetch('/api/educator/dashboard').then(function(r){return r.json();}).then(function(d){
  document.getElementById('nav-name').textContent = d.user.name || d.user.email;
  document.getElementById('nav-avatar').textContent = initials(d.user.name);
  document.getElementById('user-menu-email').textContent = d.user.email || '';
  allUnits = d.units || [];
  filterUnits();
});

genId = qs('id');
if(!genId){
  document.getElementById('content').innerHTML = '<div class="loading" style="color:#c00">Missing generation id.</div>';
} else {
  loadFeedback();
}

function loadFeedback(){
  fetch('/api/feedback/' + genId).then(function(r){return r.json();}).then(function(d){
    if(d.error){
      document.getElementById('content').innerHTML = '<div class="loading" style="color:#c00">' + d.error + '</div>';
      return;
    }
    data = d;
    document.getElementById('student-id').textContent = d.run.student_identifier || '-';
    document.getElementById('assignment-name').textContent = d.run.assignment_name || '-';
    if(d.run.unit_code){
      document.getElementById('unit-btn').textContent = d.run.unit_code;
    }
    updateStatusDisplay(d.run.review_status || 'pending');
    drawPage();
  });
}

function updateStatusDisplay(s){
  document.getElementById('status-text').textContent = statusLabels[s] || s;
  document.getElementById('status-dot').style.background = statusColors[s] || '#ccc';
}

function drawPage(){
  var overall = data.overall_feedback || {};
  var submission = data.run.submission_text || '(no submission text)';
  var wordCount = submission.trim().split(/\s+/).length;

  var strengths = overall.key_strengths || [];
  var improvements = overall.priority_improvements || [];

  var strengthsHtml = strengths.length
    ? '<ul>' + strengths.map(function(s){ return '<li>' + escapeHtml(s) + '</li>'; }).join('') + '</ul>'
    : '<div style="font-size:.8125rem;color:#999">None recorded.</div>';
  var improvementsHtml = improvements.length
    ? '<ul>' + improvements.map(function(s){ return '<li>' + escapeHtml(s) + '</li>'; }).join('') + '</ul>'
    : '<div style="font-size:.8125rem;color:#999">None recorded.</div>';

  var html = ''
    + '<div class="grid">'

    + '<div class="card">'
    + '<div class="card-title">Submission</div>'
    + '<div class="submission-box">' + escapeHtml(submission) + '</div>'
    + '<div class="word-count">Word count: <strong>' + wordCount + '</strong></div>'
    + '</div>'

    + '<div>'
    + buildGenerationSettingsPanel('Regenerate Overall Feedback', 'regenOverall')

    + '<div class="card">'
    + '<div class="card-title">Overall Feedback</div>'
    + '<label class="form-label">Overall Comment</label>'
    + '<textarea id="ta-overall" style="min-height:8.75rem">' + escapeHtml(overall.overall_comment || '') + '</textarea>'

    + '<div class="grade-row">'
    + '<button class="grade-toggle" id="grade-toggle" onclick="toggleGrade()">Show AI grade</button>'
    + '<div class="grade-area" id="grade-area">'
    + '<span class="grade-label">AI suggested grade:</span>'
    + '<span class="grade-badge">' + (overall.overall_grade_band || '-') + '</span>'
    + '</div>'
    + '</div>'

    + '<div class="list-block">'
    + '<h4 style="color:#16a34a">Key Strengths</h4>'
    + strengthsHtml
    + '</div>'

    + '<div class="list-block">'
    + '<h4 style="color:#d97706">Priority Improvements</h4>'
    + improvementsHtml
    + '</div>'

    + '<label class="form-label" style="margin-top:1rem">Final Mark (out of 100)</label>'
    + '<input type="number" id="final-mark" min="0" max="100" value="' + (overall.final_mark != null ? overall.final_mark : '') + '">'

    + '<div class="nav-row">'
    + '<button class="btn btn-secondary" onclick="goBack()">← Back to Criteria</button>'
    + '<button class="btn btn-draft" onclick="saveDraft(this)">Save Draft</button>'
    + '<button class="btn btn-save" onclick="saveAsReviewed()">Save as Reviewed</button>'
    + '</div>'

    + '</div>'
    + '</div>'

    + '</div>';

  document.getElementById('content').innerHTML = html;
  initGenerationSettings();
}

function regenOverall(){
  alert('Overall feedback regeneration will use the selected feedback settings once regeneration is wired to the backend.');
}

function toggleGrade(){
  gradeVisible = !gradeVisible;
  document.getElementById('grade-area').classList.toggle('show', gradeVisible);
  document.getElementById('grade-toggle').textContent = gradeVisible ? 'Hide AI grade' : 'Show AI grade';
}

function saveDraft(btn){
  if(!data) return;
  var payload = {
    overall_comment: document.getElementById('ta-overall').value,
    final_mark: document.getElementById('final-mark').value || null
  };
  fetch('/api/feedback/' + genId + '/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  }).then(function(r){return r.json();}).then(function(){
    var orig = btn.textContent;
    btn.textContent = 'Saved';
    setTimeout(function(){ btn.textContent = orig; }, 1200);
  });
}

function saveAsReviewed(){
  if(!data) return;
  var payload = {
    overall_comment: document.getElementById('ta-overall').value,
    final_mark: document.getElementById('final-mark').value || null,
    review_status: 'reviewed'
  };
  fetch('/api/feedback/' + genId + '/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  }).then(function(r){return r.json();}).then(function(){
    if(data.run && data.run.unit_id){
      location.href = '/educator/unit/' + data.run.unit_id + '/submissions';
    } else {
      location.href = '/educator';
    }
  });
}

function goBack(){
  location.href = '/educator/feedback-review?id=' + genId;
}
</script>
</body>
</html>
