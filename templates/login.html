<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log In — Feedback Lens</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      background: #ffffff;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* -- Nav -- */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3rem;
      height: 64px;
      border-bottom: 1px solid #f0f0f0;
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    .nav-logo {
      font-size: 1.05rem;
      font-weight: 700;
      color: #111827;
      text-decoration: none;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 8px;
      height: 8px;
      background: #2563eb;
      border-radius: 50%;
    }

    .nav-center {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-center a {
      color: #6b7280;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.15s;
    }

    .nav-center a:hover { color: #111827; }

    .btn-login {
      background: #111827;
      color: #fff;
      border: none;
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-login:hover { background: #374151; }

    /* -- Main -- */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      background: #f9fafb;
    }

    .login-card {
      background: #ffffff;
      border: 1px solid #f0f0f0;
      border-radius: 12px;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .card-header {
      margin-bottom: 2rem;
    }

    .card-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #111827;
      margin-bottom: 0.35rem;
    }

    .card-header p {
      font-size: 0.875rem;
      color: #6b7280;
    }

    /* -- Form -- */
    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #374151;
      margin-bottom: 0.4rem;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 7px;
      padding: 0.65rem 0.85rem;
      font-size: 0.9rem;
      color: #111827;
      background: #fff;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
    }

    /* -- Remember / Forgot row -- */
    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.83rem;
      color: #6b7280;
      cursor: pointer;
      user-select: none;
    }

    input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #2563eb;
      cursor: pointer;
    }

    .forgot-link {
      font-size: 0.83rem;
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-link:hover { text-decoration: underline; }

    /* -- Buttons -- */
    .btn-primary {
      width: 100%;
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 0.72rem;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 0.75rem;
    }

    .btn-primary:hover { background: #1d4ed8; }

    .btn-ghost {
      width: 100%;
      background: transparent;
      color: #374151;
      border: 1px solid #e5e7eb;
      padding: 0.72rem;
      border-radius: 7px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-ghost:hover { border-color: #9ca3af; color: #111827; }

    /* -- Divider -- */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: #d1d5db;
      font-size: 0.78rem;
    }

    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #f0f0f0;
    }

    .or-divider span { color: #9ca3af; }

    /* -- Footer -- */
    footer {
      border-top: 1px solid #f0f0f0;
      padding: 1.75rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-logo {
      font-size: 0.875rem;
      font-weight: 700;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    footer p {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    @media (max-width: 600px) {
      nav { padding: 0 1.25rem; }
      .nav-center { display: none; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; }
      .login-card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav>
    <a class="nav-logo" href="/">
      <div class="logo-dot"></div>
      Feedback Lens
    </a>
    <ul class="nav-center">
      <li><a href="/">Home</a></li>
      <li><a href="#">About Us</a></li>
      <li><a href="#">Contact Us</a></li>
    </ul>
    <button class="btn-login">Log In</button>
  </nav>

  <!-- Main -->
  <main>
    <div class="login-card">

      <div class="card-header">
        <h1>Welcome back</h1>
        <p>Log in to your Feedback Lens account.</p>
      </div>

      <form method="POST" action="/login">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@university.edu" autocomplete="email"/>        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password"/>        </div>

        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember"/>
            Remember me
          </label>
          <a class="forgot-link" href="#">Forgot password?</a>
        </div>

        {% if error %}
          <p style="color: red;">{{ error }}</p>
        {% endif %}

        <button type="submit" class="btn-primary">Sign In</button>

        <div class="or-divider"><span>or</span></div>

        <button type="button" class="btn-ghost">Create an account</button>
      </form>

    </div>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-logo">
      <div class="logo-dot"></div>
      Feedback Lens
    </div>
    <p>© 2025 Feedback Lens. All rights reserved.</p>
  </footer>

</body>
</html>
