<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Educator Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f4;min-height:100vh;color:#1f2937}
.navbar{background:#2563eb;padding:.75rem 2rem;display:flex;justify-content:space-between;align-items:center}
.nav-logo{color:#fff;font-size:1.125rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.nav-logo-icon{background:#fff;color:#2563eb;width:2rem;height:2rem;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.875rem}
.nav-right{display:flex;align-items:center;gap:1rem}
.font-toggle{display:flex;background:rgba(255,255,255,.18);border-radius:20px;padding:3px;gap:2px}
.font-btn{background:transparent;color:#fff;border:none;padding:4px 10px;border-radius:16px;font-size:.8rem;cursor:pointer}
.font-btn.active{background:#fff;color:#2563eb;font-weight:600}
.nav-user{color:#fff;text-align:right;line-height:1.2}
.nav-user-name{font-size:.875rem;font-weight:600}
.nav-user-role{font-size:.75rem;opacity:.8}
.nav-avatar{width:2.25rem;height:2.25rem;border-radius:50%;background:#fff;color:#2563eb;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.875rem}
.content{padding:2rem}
.welcome{margin-bottom:2rem}
.welcome h1{font-size:1.625rem;font-weight:700;margin-bottom:.25rem}
.welcome p{font-size:.9375rem;color:#888}
.section-title{font-size:1.125rem;font-weight:700;margin-bottom:1rem}
.units-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
.unit-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1.25rem;cursor:pointer;transition:box-shadow .2s}
.unit-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.card-tags{display:flex;gap:6px;margin-bottom:.75rem;align-items:center}
.tag{padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:500}
.tag-code{background:#eff6ff;color:#2563eb}
.tag-sem{background:#eff6ff;color:#2563eb}
.tag-progress{background:#dcfce7;color:#16a34a;margin-left:auto}
.unit-name{font-size:1rem;font-weight:700;margin-bottom:.75rem}
.unit-meta{font-size:.8125rem;color:#555;margin-bottom:4px}
.unit-pending{font-size:.8125rem;color:#d97706;margin-bottom:4px}
.unit-done{font-size:.8125rem;color:#16a34a;margin-bottom:.75rem}
.view-link{font-size:.875rem;color:#2563eb;font-weight:500;margin-top:.5rem;display:block}
.empty{color:#999;font-size:.875rem;padding:1rem 0}
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-logo">
    <div class="nav-logo-icon">FL</div>
    FeedbackLens
  </div>
  <div class="nav-right">
    <div class="font-toggle">
      <button class="font-btn" data-size="14">A-</button>
      <button class="font-btn active" data-size="16">A</button>
      <button class="font-btn" data-size="18">A+</button>
    </div>
    <div class="nav-user">
      <div class="nav-user-name" id="nav-name">-</div>
      <div class="nav-user-role">Educator</div>
    </div>
    <div class="nav-avatar" id="nav-avatar">-</div>
  </div>
</div>

<div class="content">
  <div class="welcome">
    <h1 id="welcome-msg">Welcome back!</h1>
    <p>Here's an overview of your teaching units and activities.</p>
  </div>

  <div class="section-title">In Progress Units</div>
  <div class="units-grid" id="inprogress-grid">
    <div class="empty">Loading...</div>
  </div>

  <div class="section-title">Completed Units</div>
  <div class="units-grid" id="completed-grid">
    <div class="empty">Loading...</div>
  </div>
</div>

<script>
function initials(name){
  if(!name) return '?';
  var p = name.trim().split(/\s+/);
  return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
}

var saved = localStorage.getItem('fl-font-size');
if(saved){
  document.documentElement.style.fontSize = saved + 'px';
  document.querySelectorAll('.font-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.size === saved);
  });
}
document.querySelectorAll('.font-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    var s = btn.dataset.size;
    document.documentElement.style.fontSize = s + 'px';
    localStorage.setItem('fl-font-size', s);
    document.querySelectorAll('.font-btn').forEach(function(b){
      b.classList.remove('active');
    });
    btn.classList.add('active');
  });
});

fetch('/api/educator/dashboard').then(function(r){return r.json();}).then(function(data){
  var user = data.user;
  document.getElementById('nav-name').textContent = user.name || user.email;
  document.getElementById('nav-avatar').textContent = initials(user.name);
  document.getElementById('welcome-msg').textContent = 'Welcome back, ' + (user.name || user.email) + '!';

  var units = data.units || [];
  var grid = document.getElementById('inprogress-grid');
  if(!units.length){
    grid.innerHTML = '<div class="empty">No units assigned.</div>';
  } else {
    grid.innerHTML = units.map(function(u){
      return '<div class="unit-card" onclick="location.href=\'/educator/unit/' + u.unit_id + '/submissions\'">'
        + '<div class="card-tags">'
        + '<span class="tag tag-code">' + u.unit_code + '</span>'
        + '<span class="tag tag-sem">S' + u.semester + ' ' + u.year + '</span>'
        + '<span class="tag tag-progress">In Progress</span>'
        + '</div>'
        + '<div class="unit-name">' + u.unit_name + '</div>'
        + '<div class="unit-meta">' + u.student_count + ' student(s)</div>'
        + '<div class="unit-pending">' + u.pending_count + ' pending task(s)</div>'
        + '<div class="unit-done">' + u.completed_count + ' completed</div>'
        + '<span class="view-link">View submissions →</span>'
        + '</div>';
    }).join('');
  }

  document.getElementById('completed-grid').innerHTML = '<div class="empty">No completed units.</div>';
});
</script>
</body>
</html>
