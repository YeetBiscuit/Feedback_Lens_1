<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assessment Detail</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f4;min-height:100vh;color:#1f2937}

.navbar{background:#2563eb;padding:.75rem 2rem;display:flex;justify-content:space-between;align-items:center;position:relative}
.nav-logo{color:#fff;font-size:1.125rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.nav-logo-icon{background:#fff;color:#2563eb;width:2rem;height:2rem;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.875rem}
.nav-center{display:flex;gap:.5rem}
.nav-link{background:transparent;color:#fff;border:none;padding:.4rem 1rem;border-radius:20px;font-size:.875rem;cursor:pointer;font-family:inherit;font-weight:500}
.nav-link:hover{background:rgba(255,255,255,.18)}
.nav-link.active{background:rgba(255,255,255,.25)}
.nav-right{display:flex;align-items:center;gap:.75rem;position:relative}
.font-toggle{display:flex;background:rgba(255,255,255,.18);border-radius:20px;padding:3px;gap:2px}
.font-btn{background:transparent;color:#fff;border:none;padding:4px 10px;border-radius:16px;font-size:.8rem;cursor:pointer;font-family:inherit}
.font-btn.active{background:#fff;color:#2563eb;font-weight:600}
.nav-user{color:#fff;text-align:right;line-height:1.2}
.nav-user-name{font-size:.875rem;font-weight:600}
.nav-user-role{font-size:.75rem;opacity:.8}
.nav-avatar{width:2.25rem;height:2.25rem;border-radius:50%;background:#fff;color:#2563eb;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.875rem;cursor:pointer}

.dropdown{position:absolute;top:calc(100% + .5rem);background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50;display:none}
.dropdown.show{display:block}
.user-menu{right:0;min-width:11rem;padding:.5rem}
.user-menu-email{padding:.5rem .75rem;font-size:.8125rem;color:#6b7280;border-bottom:1px solid #f3f4f6;margin-bottom:.25rem}
.user-menu-item{padding:.55rem .75rem;border-radius:6px;cursor:pointer;font-size:.875rem;color:#1f2937}
.user-menu-item:hover{background:#f9fafb}
.user-menu-item.danger{color:#dc2626}

.wrap{padding:1.5rem 2rem;max-width:1100px;margin:0 auto}
.breadcrumb{font-size:.8125rem;color:#6b7280;margin-bottom:1rem}
.breadcrumb span{color:#1f2937;font-weight:500}
.breadcrumb a{color:#6b7280;text-decoration:none}
.breadcrumb a:hover{color:#2563eb}

.title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.page-title{font-size:1.5rem;font-weight:700}
.btn-back{padding:.5rem 1.25rem;background:#fff;border:1px solid #d1d5db;border-radius:8px;font-size:.875rem;cursor:pointer;font-family:inherit;color:#374151}
.btn-back:hover{background:#f9fafb}

.main-grid{display:grid;grid-template-columns:1fr 16rem;gap:1rem;align-items:start}

.panel{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:1.5rem}

.info-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #f3f4f6}
.info-item label{display:block;font-size:.75rem;color:#6b7280;margin-bottom:4px}
.info-item .value{font-size:.9375rem;font-weight:600}
.status-pill{display:inline-block;padding:.25rem .75rem;border-radius:12px;font-size:.75rem;font-weight:500}
.status-not-submitted{background:#f3f4f6;color:#6b7280}
.status-pending{background:#fef3c7;color:#92400e}
.status-marked{background:#dcfce7;color:#15803d}

.section-title{font-size:.9375rem;font-weight:600;margin-bottom:.75rem;color:#374151}
.doc-list{display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:1.5rem}
.doc-card{display:flex;align-items:center;gap:.5rem;padding:.6rem .9rem;background:#fafafa;border:1px solid #e5e7eb;border-radius:8px;font-size:.8125rem;color:#1f2937;cursor:pointer;text-decoration:none}
.doc-card:hover{background:#f3f4f6}
.doc-icon{font-size:1rem;color:#dc2626}

.upload-zone{border:2px dashed #d1d5db;border-radius:10px;padding:2rem;text-align:center;background:#fafafa;margin-bottom:1rem}
.upload-zone .hint{color:#6b7280;font-size:.875rem;margin-bottom:1rem}
.btn-add{padding:.5rem 1.25rem;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.875rem;cursor:pointer;font-family:inherit}
.btn-add:hover{background:#1d4ed8}

.submission-files{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}
.submitted-file{display:flex;align-items:center;gap:.6rem;padding:.65rem .9rem;background:#fafafa;border:1px solid #e5e7eb;border-radius:8px;font-size:.8125rem}

.action-row{display:flex;justify-content:flex-end;gap:.6rem;margin-top:1rem;padding-top:1rem;border-top:1px solid #f3f4f6}
.btn-draft{padding:.5rem 1.25rem;background:#fff;color:#374151;border:1px solid #d1d5db;border-radius:8px;font-size:.875rem;cursor:pointer;font-family:inherit}
.btn-draft:hover{background:#f9fafb}
.btn-submit{padding:.5rem 1.25rem;background:#1f2937;color:#fff;border:none;border-radius:8px;font-size:.875rem;cursor:pointer;font-family:inherit}
.btn-submit:hover{background:#111827}
.btn-feedback{padding:.5rem 1.5rem;background:#15803d;color:#fff;border:none;border-radius:8px;font-size:.875rem;cursor:pointer;font-family:inherit;font-weight:500}
.btn-feedback:hover{background:#166534}

.side-panel{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:1.25rem;text-align:center}
.side-panel .icon{width:3rem;height:3rem;border-radius:50%;background:#fef3c7;color:#92400e;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:1.25rem;font-weight:700}
.side-panel .title{font-size:.9375rem;font-weight:600;margin-bottom:.5rem}
.side-panel .text{font-size:.75rem;color:#6b7280;line-height:1.5}

.loading{color:#888;text-align:center;padding:1.5rem}
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-logo">
    <div class="nav-logo-icon">FL</div>
    FeedbackLens
  </div>
  <div class="nav-center">
    <button class="nav-link" onclick="location.href='/student'">Home</button>
    <button class="nav-link" onclick="location.href='/student/units'">My Units</button>
    <button class="nav-link" onclick="location.href='/student/assessments'">Assessments</button>
    <button class="nav-link" onclick="location.href='/student/feedback'">Feedback</button>
  </div>
  <div class="nav-right">
    <div class="font-toggle">
      <button class="font-btn" data-size="14">A-</button>
      <button class="font-btn active" data-size="16">A</button>
      <button class="font-btn" data-size="18">A+</button>
    </div>
    <div class="nav-user">
      <div class="nav-user-name" id="nav-name">-</div>
      <div class="nav-user-role">Student</div>
    </div>
    <div class="nav-avatar" id="nav-avatar" onclick="toggleUserMenu(event)">-</div>
    <div class="dropdown user-menu" id="user-menu">
      <div class="user-menu-email" id="user-menu-email">-</div>
      <div class="user-menu-item danger" onclick="location.href='/logout'">Log out</div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="breadcrumb" id="breadcrumb">Home &rsaquo; <span>Assessment</span></div>

  <div class="title-row">
    <h1 class="page-title" id="page-title">Assessment</h1>
    <button class="btn-back" onclick="history.back()">Back</button>
  </div>

  <div id="content">
    <div class="loading">Loading...</div>
  </div>
</div>

<script>
var assignmentId = {{ assignment_id }};
var data = null;

function initials(name){
  if(!name) return '?';
  var p = name.trim().split(/\s+/);
  return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
}

function formatDate(s){
  if(!s) return 'TBA';
  return s.split(' ')[0];
}

function fileName(path){
  if(!path) return 'document';
  var parts = path.split('/');
  return parts[parts.length - 1];
}

function escapeHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(ch){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
  });
}

var saved = localStorage.getItem('fl-font-size');
if(saved){
  document.documentElement.style.fontSize = saved + 'px';
  document.querySelectorAll('.font-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.size === saved);
  });
}
document.querySelectorAll('.font-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    var s = btn.dataset.size;
    document.documentElement.style.fontSize = s + 'px';
    localStorage.setItem('fl-font-size', s);
    document.querySelectorAll('.font-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  });
});

function toggleUserMenu(e){
  e.stopPropagation();
  document.getElementById('user-menu').classList.toggle('show');
}
document.addEventListener('click', function(){
  document.getElementById('user-menu').classList.remove('show');
});
document.getElementById('user-menu').addEventListener('click', function(e){ e.stopPropagation(); });

fetch('/api/student/home').then(function(r){return r.json();}).then(function(d){
  if(!d.user) return;
  var name = d.user.display_name || d.user.email;
  document.getElementById('nav-name').textContent = name;
  document.getElementById('nav-avatar').textContent = initials(name);
  document.getElementById('user-menu-email').textContent = d.user.email || '';
});

fetch('/api/student/assessment/' + assignmentId).then(function(r){return r.json();}).then(function(d){
  if(d.error){
    document.getElementById('content').innerHTML = '<div class="loading" style="color:#c00">' + d.error + '</div>';
    return;
  }
  data = d;
  render();
});

function render(){
  var a = data.assignment;
  var sub = data.submission;
  var status = data.status;
  var spec = data.spec;
  var materials = data.materials || [];

  document.getElementById('breadcrumb').innerHTML =
    'Home &rsaquo; <a href="/student/units">My Units</a> &rsaquo; '
    + '<a href="/student/unit/' + a.unit_id + '">' + escapeHtml(a.unit_code) + '</a> &rsaquo; '
    + '<span>' + escapeHtml(a.assignment_name) + '</span>';
  document.getElementById('page-title').textContent = a.unit_code + ' - ' + a.assignment_name;

  var statusInfo = {
    'not_submitted': {cls: 'status-not-submitted', text: 'Not Submitted'},
    'pending': {cls: 'status-pending', text: 'Pending'},
    'marked': {cls: 'status-marked', text: 'Marked'}
  }[status] || {cls: 'status-not-submitted', text: 'Unknown'};

  
  var docHtml = '';
  if(spec){
    docHtml += '<a href="/api/student/download/spec/' + spec.spec_id + '" class="doc-card">'
      + '<span class="doc-icon">&#128196;</span>'
      + escapeHtml(fileName(spec.source_file_path) || 'Submission Brief')
      + '</a>';
  }
  materials.forEach(function(m){
    docHtml += '<a href="/api/student/download/material/' + m.material_id + '" class="doc-card">'
      + '<span class="doc-icon">&#128196;</span>'
      + escapeHtml(m.title || fileName(m.source_file_path))
      + '</a>';
  });
  if(!docHtml){
    docHtml = '<div style="color:#9ca3af;font-size:.8125rem">No supporting documents available.</div>';
  }

  var mainHtml = ''
    + '<div class="info-row">'
    +   '<div class="info-item"><label>Unit</label><div class="value">' + escapeHtml(a.unit_code) + '</div></div>'
    +   '<div class="info-item"><label>Type</label><div class="value">' + escapeHtml(a.assignment_type || 'Assessment') + '</div></div>'
    +   '<div class="info-item"><label>Status</label><div class="value"><span class="status-pill ' + statusInfo.cls + '">' + statusInfo.text + '</span></div></div>'
    + '</div>'

    + '<div class="section-title">Reference Documents</div>'
    + '<div class="doc-list">' + docHtml + '</div>';

  if(status === 'not_submitted'){
    mainHtml += ''
      + '<div class="section-title">Your Submission</div>'
      + '<div class="upload-zone">'
      +   '<div class="hint">Drop your submission file here, or click to choose.</div>'
      +   '<button class="btn-add" onclick="addSubmission()">Add Submission</button>'
      + '</div>'
      + '<div class="action-row">'
      +   '<button class="btn-draft" onclick="saveDraft()">Save as Draft</button>'
      +   '<button class="btn-submit" onclick="submitAssignment()">Submit</button>'
      + '</div>';
  } else {
    mainHtml += ''
        + '<div class="section-title">Your Submission</div>'
        + '<div class="submission-files">'
        +   '<a href="/api/student/download/submission/' + sub.submission_id + '" class="submitted-file" style="text-decoration:none;color:inherit">'
        +     '<span class="doc-icon">&#128196;</span>'
        +     '<span>' + escapeHtml(fileName(sub.original_file_path) || 'submission.pdf') + '</span>'
        +     '<span style="color:#9ca3af;margin-left:auto">Submitted ' + formatDate(sub.submitted_at) + '</span>'
        +   '</a>'
        + '</div>';

    if(status === 'marked' && data.generation_id){
      mainHtml += '<div class="action-row">'
        + '<button class="btn-feedback" onclick="location.href=\'/student/feedback/' + data.generation_id + '\'">View Feedback</button>'
        + '</div>';
    }
  }
  var sideHtml = ''
    + '<div class="side-panel">'
    +   '<div class="icon">&#9888;</div>'
    +   '<div class="title">AI Feedback Notice</div>'
    +   '<div class="text">Feedback on your submission may be generated with the help of AI. By submitting your work you acknowledge the unit\'s Academic Integrity policy.</div>'
    + '</div>';

  document.getElementById('content').innerHTML =
    '<div class="main-grid">'
    + '<div class="panel">' + mainHtml + '</div>'
    + '<div>' + sideHtml + '</div>'
    + '</div>';
}

function addSubmission(){
  alert('File upload will be available once the backend is connected.');
}
function saveDraft(){
  alert('Save as draft will be handled by the backend.');
}
function submitAssignment(){
  alert('Submit will be handled by the backend.');
}
</script>
</body>
</html>
