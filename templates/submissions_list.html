<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submissions</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f4;min-height:100vh;color:#1f2937}

.navbar{background:#2563eb;padding:.75rem 2rem;display:flex;justify-content:space-between;align-items:center;position:relative}
.nav-logo{color:#fff;font-size:1.125rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.nav-logo-icon{background:#fff;color:#2563eb;width:2rem;height:2rem;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.875rem}
.nav-center{display:flex;gap:.5rem;position:relative}
.nav-btn{background:rgba(255,255,255,.18);color:#fff;border:none;padding:.4rem 1rem;border-radius:20px;font-size:.875rem;cursor:pointer;font-family:inherit}
.nav-btn:hover{background:rgba(255,255,255,.28)}
.nav-right{display:flex;align-items:center;gap:.75rem;position:relative}
.font-toggle{display:flex;background:rgba(255,255,255,.18);border-radius:20px;padding:3px;gap:2px}
.font-btn{background:transparent;color:#fff;border:none;padding:4px 10px;border-radius:16px;font-size:.8rem;cursor:pointer;font-family:inherit}
.font-btn.active{background:#fff;color:#2563eb;font-weight:600}
.nav-user{color:#fff;text-align:right;line-height:1.2}
.nav-user-name{font-size:.875rem;font-weight:600}
.nav-user-role{font-size:.75rem;opacity:.8}
.nav-avatar{width:2.25rem;height:2.25rem;border-radius:50%;background:#fff;color:#2563eb;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.875rem;cursor:pointer}

.dropdown{position:absolute;top:calc(100% + .5rem);background:#fff;border:1px solid #e5e7eb;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:50;display:none}
.dropdown.show{display:block}
.unit-picker{left:0;width:22rem;padding:.75rem}
.unit-picker input{width:100%;padding:.5rem .75rem;border:1px solid #d1d5db;border-radius:8px;font-size:.875rem;margin-bottom:.5rem;font-family:inherit}
.unit-picker input:focus{outline:none;border-color:#2563eb}
.unit-option{padding:.6rem .75rem;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.unit-option:hover{background:#f9fafb}
.unit-option-meta{flex:1}
.unit-option-code{font-weight:700;font-size:.9375rem;color:#1f2937}
.unit-option-name{font-size:.8125rem;color:#6b7280;margin-top:2px}
.unit-option-status{font-size:.7rem;padding:2px 8px;border-radius:10px;background:#dcfce7;color:#15803d;font-weight:500}

.user-menu{right:0;min-width:11rem;padding:.5rem}
.user-menu-email{padding:.5rem .75rem;font-size:.8125rem;color:#6b7280;border-bottom:1px solid #f3f4f6;margin-bottom:.25rem}
.user-menu-item{padding:.55rem .75rem;border-radius:6px;cursor:pointer;font-size:.875rem;color:#1f2937}
.user-menu-item:hover{background:#f9fafb}
.user-menu-item.danger{color:#dc2626}

.layout{display:flex;min-height:calc(100vh - 3.75rem)}
.sidebar{width:12.5rem;background:#fff;border-right:1px solid #e5e7eb;padding:1rem 0}
.sidebar-item{display:block;padding:.7rem 1.5rem;font-size:.875rem;color:#4b5563;cursor:pointer;border-left:3px solid transparent}
.sidebar-item:hover{background:#f9fafb}
.sidebar-item.active{background:#eff6ff;color:#2563eb;border-left-color:#2563eb;font-weight:600}

.main{flex:1;padding:2rem}
.page-title{font-size:1.5rem;font-weight:700;margin-bottom:.25rem}
.page-sub{font-size:.875rem;color:#6b7280;margin-bottom:1.5rem}

.filter-bar{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:.85rem;margin-bottom:1rem;display:flex;gap:.75rem;align-items:center}
.search-input{flex:1}
.search-input input{width:100%;padding:.55rem .75rem;border:1px solid #d1d5db;border-radius:8px;font-size:.875rem;font-family:inherit}
.search-input input:focus{outline:none;border-color:#2563eb}
.status-select{padding:.55rem .75rem;border:1px solid #d1d5db;border-radius:8px;font-size:.875rem;background:#fff;min-width:10.5rem;cursor:pointer;font-family:inherit}

.settings-bar{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:.85rem;margin-bottom:1rem;display:flex;gap:.75rem;align-items:end;flex-wrap:wrap}
.settings-title{font-size:.875rem;font-weight:600;color:#1f2937;margin-right:.25rem;align-self:center}
.settings-control{display:flex;flex-direction:column;gap:4px;min-width:11rem}
.settings-control span{font-size:.75rem;color:#6b7280}
.settings-control select{padding:.5rem .7rem;border:1px solid #d1d5db;border-radius:8px;font-size:.875rem;background:#fff;cursor:pointer;font-family:inherit}
.settings-control select:focus{outline:none;border-color:#2563eb}
.btn-reset{padding:.5rem .8rem;border:1px solid #d1d5db;border-radius:8px;background:#fff;color:#374151;font-size:.8125rem;cursor:pointer;font-family:inherit}
.btn-reset:hover{background:#f9fafb}

.bulk-bar{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:.6rem .9rem;margin-bottom:1rem;display:none;align-items:center;justify-content:space-between}
.bulk-bar.show{display:flex}
.bulk-text{font-size:.875rem;color:#1e40af;font-weight:500}
.btn-bulk{padding:.4rem .9rem;border-radius:6px;font-size:.8125rem;font-weight:500;cursor:pointer;border:none;font-family:inherit;background:#2563eb;color:#fff}
.btn-bulk:hover{background:#1d4ed8}
.btn-bulk:disabled,.btn-action:disabled{background:#cbd5e1;color:#fff;cursor:not-allowed}

.table-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{background:#f9fafb}
th{text-align:left;padding:.75rem 1rem;font-size:.6875rem;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #e5e7eb}
td{padding:.85rem 1rem;font-size:.875rem;color:#1f2937;border-bottom:1px solid #f3f4f6;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover{background:#fafafa}
.cb-col{width:2.5rem}
input[type=checkbox]{width:1rem;height:1rem;cursor:pointer}
.grade{font-weight:700;font-size:.9375rem}
.grade-HD{color:#7c3aed}
.grade-D{color:#2563eb}
.grade-C{color:#16a34a}
.grade-P{color:#d97706}
.grade-N{color:#dc2626}

.status-select-inline{padding:.25rem .6rem;border-radius:12px;font-size:.75rem;font-weight:500;cursor:pointer;border:none;font-family:inherit;appearance:none}
.status-select-inline.pending{background-color:#fef3c7;color:#92400e}
.status-select-inline.ai{background-color:#dbeafe;color:#1e40af}
.status-select-inline.reviewed{background-color:#dcfce7;color:#15803d}

.action-cell{text-align:right}
.btn-action{padding:.4rem .9rem;border-radius:6px;font-size:.8125rem;font-weight:500;cursor:pointer;border:none;font-family:inherit}
.btn-generate{background:#2563eb;color:#fff}
.btn-generate:hover{background:#1d4ed8}
.btn-view{background:#1f2937;color:#fff}
.btn-view:hover{background:#111827}
.empty-row td{padding:2rem;text-align:center;color:#888}
.empty{color:#999;font-size:.875rem;text-align:center;padding:1rem}
</style>
</head>
<body>

<div class="navbar">
  <div class="nav-logo">
    <div class="nav-logo-icon">FL</div>
    FeedbackLens
  </div>
  <div class="nav-center">
    <button class="nav-btn" onclick="location.href='/educator'">Home</button>
    <button class="nav-btn" id="unit-btn" onclick="toggleUnitPicker(event)">-</button>
    <div class="dropdown unit-picker" id="unit-picker">
      <input type="text" id="unit-search" placeholder="Search units..." oninput="filterUnits()">
      <div id="unit-list"></div>
    </div>
  </div>
  <div class="nav-right">
    <div class="font-toggle">
      <button class="font-btn" data-size="14">A-</button>
      <button class="font-btn active" data-size="16">A</button>
      <button class="font-btn" data-size="18">A+</button>
    </div>
    <div class="nav-user">
      <div class="nav-user-name" id="nav-name">-</div>
      <div class="nav-user-role">Educator</div>
    </div>
    <div class="nav-avatar" id="nav-avatar" onclick="toggleUserMenu(event)">-</div>
    <div class="dropdown user-menu" id="user-menu">
      <div class="user-menu-email" id="user-menu-email">-</div>
      <div class="user-menu-item danger" onclick="location.href='/logout'">Log out</div>
    </div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-item" id="link-dashboard">Dashboard</div>
    <div class="sidebar-item active">Submissions</div>
    <div class="sidebar-item" id="link-ai">AI Performance</div>
    <div class="sidebar-item" id="link-export">Export</div>
  </div>

  <div class="main">
    <h1 class="page-title" id="page-title">Submissions</h1>
    <div class="page-sub">Review and manage student submissions</div>

    <div class="filter-bar">
      <div class="search-input">
        <input type="text" id="search" placeholder="Search by student or assessment...">
      </div>
      <select class="status-select" id="status-filter">
        <option value="all">All Status</option>
        <option value="pending">Pending Review</option>
        <option value="ai_generated">AI Generated</option>
        <option value="reviewed">Reviewed</option>
      </select>
    </div>

    <div class="settings-bar">
      <div class="settings-title">Feedback settings</div>
      <label class="settings-control">
        <span>Modifiers</span>
        <select id="feedback-modifier-mode">
          <option value="system_default">System default</option>
          <option value="custom">Custom length/tone</option>
        </select>
      </label>
      <label class="settings-control modifier-setting">
        <span>Length</span>
        <select id="feedback-length">
          <option value="concise">Concise</option>
          <option value="standard">Standard</option>
          <option value="detailed">Detailed</option>
        </select>
      </label>
      <label class="settings-control modifier-setting">
        <span>Tone</span>
        <select id="feedback-tone">
          <option value="clear_supportive">Clear + supportive</option>
          <option value="gentle_encouraging">Gentle + encouraging</option>
          <option value="direct_no_fluff">Direct, no fluff</option>
        </select>
      </label>
      <button class="btn-reset" onclick="resetGenerationSettings()">Reset</button>
    </div>

    <div class="bulk-bar" id="bulk-bar">
      <div class="bulk-text"><span id="bulk-count">0</span> selected</div>
      <div>
        <button class="btn-bulk" id="bulk-generate-btn" onclick="bulkGenerate()">Generate Feedback</button>
      </div>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th class="cb-col"><input type="checkbox" id="cb-all" onchange="toggleAll()"></th>
            <th>Student</th>
            <th>Assessment</th>
            <th>Submission Date</th>
            <th>Estimate Grade</th>
            <th>Final Mark</th>
            <th>Status</th>
            <th class="action-cell">Action</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr class="empty-row"><td colspan="8">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
var unitId = {{ unit_id }};
var rows = [];
var selected = {};
var allUnits = [];

function initials(name){
  if(!name) return '?';
  var p = name.trim().split(/\s+/);
  return (p[0][0] + (p[1] ? p[1][0] : '')).toUpperCase();
}

function shortId(s){
  if(!s) return '-';
  return s.length > 30 ? s.substring(0, 28) + '...' : s;
}

function formatDate(s){
  if(!s) return '-';
  return s.split(' ')[0];
}

function statusClass(s){
  if(s === 'reviewed') return 'reviewed';
  if(s === 'ai_generated') return 'ai';
  return 'pending';
}

function getVisible(){
  var query = document.getElementById('search').value.trim().toLowerCase();
  var filter = document.getElementById('status-filter').value;
  return rows.filter(function(r){
    if(filter !== 'all' && r.review_status !== filter) return false;
    if(query){
      var text = (r.student_identifier + ' ' + r.assignment_name).toLowerCase();
      return text.indexOf(query) !== -1;
    }
    return true;
  });
}

function render(){
  var visible = getVisible();
  var body = document.getElementById('table-body');
  if(!visible.length){
    body.innerHTML = '<tr class="empty-row"><td colspan="8">No submissions found.</td></tr>';
    updateBulkBar();
    return;
  }

  body.innerHTML = visible.map(function(r){
    var grade = r.overall_grade_band || '-';
    var gradeCls = r.overall_grade_band ? 'grade grade-' + r.overall_grade_band : 'grade';
    var mark = r.final_mark != null ? r.final_mark : '-';
    var checked = selected[r.submission_id] ? 'checked' : '';
    var statusCls = statusClass(r.review_status);

    var statusCell;
    if(r.generation_id){
      statusCell = '<select class="status-select-inline ' + statusCls + '" onchange="changeStatus(' + r.generation_id + ', this)">'
        + '<option value="pending"' + (r.review_status === 'pending' ? ' selected' : '') + '>Pending</option>'
        + '<option value="ai_generated"' + (r.review_status === 'ai_generated' ? ' selected' : '') + '>AI Generated</option>'
        + '<option value="reviewed"' + (r.review_status === 'reviewed' ? ' selected' : '') + '>Reviewed</option>'
        + '</select>';
    } else {
      statusCell = '<select class="status-select-inline pending" disabled><option>Pending</option></select>';
    }

    var action;
    if(r.generation_id){
      action = '<button class="btn-action btn-view" onclick="openReview(' + r.generation_id + ')">View Detail</button>';
    } else {
      action = '<button class="btn-action btn-generate" onclick="generateOne(' + r.submission_id + ', this)">Generate</button>';
    }

    return '<tr>'
      + '<td><input type="checkbox" ' + checked + ' onchange="toggleOne(' + r.submission_id + ', this.checked)"></td>'
      + '<td>' + shortId(r.student_identifier) + '</td>'
      + '<td>' + (r.assignment_name || '-') + '</td>'
      + '<td>' + formatDate(r.submitted_at) + '</td>'
      + '<td><span class="' + gradeCls + '">' + grade + '</span></td>'
      + '<td>' + mark + '</td>'
      + '<td>' + statusCell + '</td>'
      + '<td class="action-cell">' + action + '</td>'
      + '</tr>';
  }).join('');

  updateBulkBar();
}

function changeStatus(genId, sel){
  var newStatus = sel.value;
  sel.className = 'status-select-inline ' + statusClass(newStatus);
  fetch('/api/feedback/' + genId + '/save', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({review_status: newStatus})
  }).then(function(r){return r.json();}).then(function(){
    var row = rows.find(function(r){ return r.generation_id === genId; });
    if(row) row.review_status = newStatus;
  });
}

function toggleOne(id, checked){
  if(checked) selected[id] = true;
  else delete selected[id];
  updateBulkBar();
  syncSelectAll();
}

function toggleAll(){
  var all = document.getElementById('cb-all').checked;
  var visible = getVisible();
  selected = {};
  if(all){
    visible.forEach(function(r){ selected[r.submission_id] = true; });
  }
  render();
}

function syncSelectAll(){
  var visible = getVisible();
  var picked = visible.filter(function(r){ return selected[r.submission_id]; }).length;
  document.getElementById('cb-all').checked = visible.length > 0 && picked === visible.length;
}

function updateBulkBar(){
  var n = Object.keys(selected).length;
  document.getElementById('bulk-count').textContent = n;
  document.getElementById('bulk-bar').classList.toggle('show', n > 0);
}

var settingsStorageKey = 'fl-feedback-generation-settings';
var defaultGenerationSettings = {
  feedback_modifier_mode: 'system_default',
  feedback_length: 'standard',
  feedback_tone: 'clear_supportive'
};

function readGenerationSettings(){
  return {
    feedback_modifier_mode: document.getElementById('feedback-modifier-mode').value,
    feedback_length: document.getElementById('feedback-length').value,
    feedback_tone: document.getElementById('feedback-tone').value
  };
}

function getGenerationSettings(){
  var settings = readGenerationSettings();
  if(settings.feedback_modifier_mode !== 'custom'){
    return {feedback_modifier_mode: settings.feedback_modifier_mode};
  }
  return settings;
}

function saveGenerationSettings(){
  var settings = readGenerationSettings();
  localStorage.setItem(settingsStorageKey, JSON.stringify(settings));
}

function syncFeedbackModifierControls(){
  var isCustom = document.getElementById('feedback-modifier-mode').value === 'custom';
  document.querySelectorAll('.modifier-setting').forEach(function(el){
    el.style.display = isCustom ? '' : 'none';
  });
  document.getElementById('feedback-length').disabled = !isCustom;
  document.getElementById('feedback-tone').disabled = !isCustom;
}

function resetGenerationSettings(){
  document.getElementById('feedback-modifier-mode').value = defaultGenerationSettings.feedback_modifier_mode;
  document.getElementById('feedback-length').value = defaultGenerationSettings.feedback_length;
  document.getElementById('feedback-tone').value = defaultGenerationSettings.feedback_tone;
  syncFeedbackModifierControls();
  saveGenerationSettings();
}

function initGenerationSettings(){
  var savedSettings = null;
  try {
    savedSettings = JSON.parse(localStorage.getItem(settingsStorageKey) || 'null');
  } catch(e) {
    savedSettings = null;
  }
  document.getElementById('feedback-modifier-mode').value =
    (savedSettings && savedSettings.feedback_modifier_mode) || defaultGenerationSettings.feedback_modifier_mode;
  document.getElementById('feedback-length').value =
    (savedSettings && savedSettings.feedback_length) || defaultGenerationSettings.feedback_length;
  document.getElementById('feedback-tone').value =
    (savedSettings && savedSettings.feedback_tone) || defaultGenerationSettings.feedback_tone;
  syncFeedbackModifierControls();
}

function generationPayload(id){
  var settings = getGenerationSettings();
  settings.submission_id = id;
  return settings;
}

function requestGeneration(id){
  return fetch('/api/feedback/generate', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(generationPayload(id))
  }).then(function(r){
    return r.json().then(function(data){
      if(!r.ok || data.error){
        throw new Error(data.error || 'Generation failed.');
      }
      return data;
    });
  });
}

function bulkGenerate(){
  var ids = rows.filter(function(r){
    return selected[r.submission_id] && !r.generation_id;
  }).map(function(r){ return r.submission_id; });
  if(!ids.length){
    alert('Select one or more pending submissions to generate feedback.');
    return;
  }
  var btn = document.getElementById('bulk-generate-btn');
  btn.disabled = true;
  btn.textContent = 'Generating...';

  var chain = Promise.resolve();
  ids.forEach(function(id){
    chain = chain.then(function(){ return requestGeneration(id); });
  });
  chain.then(function(){
    selected = {};
    location.reload();
  }).catch(function(err){
    alert(err.message || 'Generation failed. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Generate Feedback';
  });
}

function generateOne(id, btn){
  var original = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Generating...';
  requestGeneration(id).then(function(data){
    location.href = '/educator/feedback-review?id=' + data.generation_id;
  }).catch(function(err){
    alert(err.message || 'Generation failed. Please try again.');
    btn.disabled = false;
    btn.textContent = original;
  });
}

function openReview(id){
  location.href = '/educator/feedback-review?id=' + id;
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('status-filter').addEventListener('change', render);
document.getElementById('feedback-modifier-mode').addEventListener('change', function(){
  syncFeedbackModifierControls();
  saveGenerationSettings();
});
document.getElementById('feedback-length').addEventListener('change', saveGenerationSettings);
document.getElementById('feedback-tone').addEventListener('change', saveGenerationSettings);
initGenerationSettings();

// font toggle
var saved = localStorage.getItem('fl-font-size');
if(saved){
  document.documentElement.style.fontSize = saved + 'px';
  document.querySelectorAll('.font-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.size === saved);
  });
}
document.querySelectorAll('.font-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    var s = btn.dataset.size;
    document.documentElement.style.fontSize = s + 'px';
    localStorage.setItem('fl-font-size', s);
    document.querySelectorAll('.font-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  });
});

// dropdowns
function toggleUnitPicker(e){
  e.stopPropagation();
  document.getElementById('user-menu').classList.remove('show');
  document.getElementById('unit-picker').classList.toggle('show');
}
function toggleUserMenu(e){
  e.stopPropagation();
  document.getElementById('unit-picker').classList.remove('show');
  document.getElementById('user-menu').classList.toggle('show');
}
document.addEventListener('click', function(){
  document.getElementById('unit-picker').classList.remove('show');
  document.getElementById('user-menu').classList.remove('show');
});
document.getElementById('unit-picker').addEventListener('click', function(e){ e.stopPropagation(); });
document.getElementById('user-menu').addEventListener('click', function(e){ e.stopPropagation(); });

function filterUnits(){
  var q = document.getElementById('unit-search').value.trim().toLowerCase();
  var filtered = allUnits.filter(function(u){
    return !q || u.unit_code.toLowerCase().indexOf(q) !== -1 || u.unit_name.toLowerCase().indexOf(q) !== -1;
  });
  document.getElementById('unit-list').innerHTML = filtered.map(function(u){
    return '<div class="unit-option" onclick="location.href=\'/educator/unit/' + u.unit_id + '\'">'
      + '<div class="unit-option-meta">'
      +   '<div class="unit-option-code">' + u.unit_code + '</div>'
      +   '<div class="unit-option-name">' + u.unit_name + '</div>'
      + '</div>'
      + '<div class="unit-option-status">In Progress</div>'
      + '</div>';
  }).join('') || '<div class="empty">No matching units</div>';
}

document.getElementById('link-dashboard').onclick = function(){
  location.href = '/educator/unit/' + unitId;
};

document.getElementById('link-ai').onclick = function(){
  location.href = '/educator/unit/' + unitId + '/ai-performance';
};

document.getElementById('link-export').onclick = function(){
  location.href = '/educator/unit/' + unitId + '/export';
};

fetch('/api/educator/dashboard').then(function(r){return r.json();}).then(function(d){
  var u = d.user;
  document.getElementById('nav-name').textContent = u.name || u.email;
  document.getElementById('nav-avatar').textContent = initials(u.name);
  document.getElementById('user-menu-email').textContent = u.email || '';
  allUnits = d.units || [];
  filterUnits();
});


fetch('/api/educator/unit/' + unitId + '/submissions')
  .then(function(r){ return r.json(); })
  .then(function(data){
    if(data.error){
      document.getElementById('table-body').innerHTML =
        '<tr class="empty-row"><td colspan="8" style="color:#c00">' + data.error + '</td></tr>';
      return;
    }
    document.getElementById('page-title').textContent = 'Submissions - ' + data.unit.unit_code;
    document.getElementById('unit-btn').textContent = data.unit.unit_code;
    rows = data.submissions || [];
    render();
  });
</script>
</body>
</html>
